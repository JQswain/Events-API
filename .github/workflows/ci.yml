name: Events-API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deployment-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker image
        run: |
          docker build -t events-api:latest .

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name events-api-container events-api:latest
          
          echo "=== RUNNING CONTAINERS ==="
          docker ps -a
          
          echo "=== CONTAINER LOGS ==="
          docker logs events-api-container
          
          sleep 10
          curl -v http://127.0.0.1:5000/api/health || exit 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Unit-Test
        run: |
          pytest -v

      - name: Cleanup
        if: always()
        run: |
            docker stop events-api-container
            docker rm events-api-container


