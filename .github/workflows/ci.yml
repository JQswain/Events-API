name: Events-API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker image
        run: |
          docker build -t events-api:latest .

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name events-api-container events-api:latest
          sleep 5
          curl http://127.0.0.1:5000/api/health || exit 1

